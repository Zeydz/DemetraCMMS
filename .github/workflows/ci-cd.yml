
# CI/CD Pipeline Configuration for GitHub Actions
# ASP.NET Core MVC Project with SQLite

name: CI/CD Pipeline

# Trigger on push to main/master branch and pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

jobs:
  # JOB 1: BUILD AND TEST
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code from repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      # Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore
      
      # Build the project
      - name: Build project
        run: dotnet build --configuration Release --no-restore
      
      # Run tests (if any exist)
      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        continue-on-error: true # Don't fail pipeline if no tests exist
      
      # Check database migrations
      - name: Check EF migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef migrations list --project . || echo "No migrations found"
        continue-on-error: true
      
      # Publish application
      - name: Publish application
        run: dotnet publish --configuration Release --output ./publish
      
      # Upload published artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ./publish
          retention-days: 7

  # JOB 2: CODE QUALITY CHECK
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test # Run after build succeeds
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      # Check code formatting
      - name: Check code format
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true # Warning only, don't fail
      
      # Security scan (optional)
      - name: Security scan
        run: |
          dotnet list package --vulnerable --include-transitive
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════
